<!DOCTYPE html>
<html>
<head>
  <title>Chatbot</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      font-family: Arial, sans-serif;
    }

    #chatbot-root {
      position: fixed;

      width: 100%;
      max-width: 360px;
      display: none;
      z-index: 99998;
    }
    #chatbot-root,
    #chat-toggle-btn {
      position: fixed;
    }
    #chatbot-root, #chat-toggle-btn {
      transition: all 0.3s ease;
    }
    #chat-toggle-btn {
      position: fixed;
      width: 60px;
      height: 60px;

      border-radius: 50%;
      border: none;
      cursor: pointer;

      padding: 0;                 /* 🔥 important */
      overflow: hidden;           /* 🔥 crop image perfectly */

      background: transparent;    /* ❌ remove gradient */

      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }

    .chat-icon-img {
      width: 100%;        /* 🔥 full fill */
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>

<body>

<div id="chatbot-root"></div>

<button id="chat-toggle-btn">
  <img id="chat-toggle-avatar" class="chat-icon-img" />
</button>

<script src="/static/js/LaunchBot.js"></script>

<script>
const root = document.getElementById("chatbot-root");
const toggleBtn = document.getElementById("chat-toggle-btn");
const avatarImg = document.getElementById("chat-toggle-avatar");

let isOpen = false;

/* 🔥 AVATAR RESOLVER */
function resolveAvatar(icon) {
  if (!icon) return "";
  if (icon.startsWith("http") || icon.startsWith("blob:")) return icon;
  return  icon;
}

/* 🔥 FETCH CONFIG */
async function fetchBotConfig() {
  try {
    const instanceId = window.location.pathname.split('/').pop();

    const res = await fetch(`/custom_bot_new/get-customize/${instanceId}`);

    const data = await res.json();
    const botData = data?.data || {};

    return botData;

  } catch (err) {
    console.error("Failed to fetch bot config", err);
    return null;
  }
}

function applyPosition(position) {
  const root = document.getElementById("chatbot-root");
  const toggleBtn = document.getElementById("chat-toggle-btn");

  // reset all
  root.style.top = "";
  root.style.bottom = "";
  root.style.left = "";
  root.style.right = "";

  toggleBtn.style.top = "";
  toggleBtn.style.bottom = "";
  toggleBtn.style.left = "";
  toggleBtn.style.right = "";

  switch (position) {
    case "bottom_left":
      root.style.bottom = "90px";
      root.style.left = "20px";

      toggleBtn.style.bottom = "20px";
      toggleBtn.style.left = "20px";
      break;

    case "top_right":
      root.style.top = "90px";
      root.style.right = "20px";

      toggleBtn.style.top = "20px";
      toggleBtn.style.right = "20px";
      break;

    case "top_left":
      root.style.top = "90px";
      root.style.left = "20px";

      toggleBtn.style.top = "20px";
      toggleBtn.style.left = "20px";
      break;

    default: // bottom_right
      root.style.bottom = "90px";
      root.style.right = "20px";

      toggleBtn.style.bottom = "20px";
      toggleBtn.style.right = "20px";
  }
}
/* 🔥 INIT FLOW */
(async () => {
  const botData = await fetchBotConfig();

  const fallbackAvatar = "https://cdn-icons-png.flaticon.com/512/4712/4712109.png";

  if (botData) {
    const avatarUrl = resolveAvatar(botData.avatar);
    console.log("POPOPOPO",botData);
    console.log("AAAAAA",avatarUrl);
    /* ✅ SET GLOBAL CONFIG */
    // window.botConfig = {
    //   avatar: avatarUrl,
    //   chatbot_name: botData.chatbot_name,
    //   colors: botData.colors || {},
    //   bot_id: botData.bot_id,
    //   instance_id: botData.instance_id,
    //   greeting_message: botData.greeting_message
    // };

    /* ✅ SET TOGGLE UI */
    avatarImg.src = avatarUrl || fallbackAvatar;

    if (botData.colors?.set3) {
      toggleBtn.style.background =
        `linear-gradient(135deg, ${botData.colors.set3.join(",")})`;
    }
    applyPosition(botData.position || "bottom_right")

  } else {
    avatarImg.src = fallbackAvatar;
  }

  /* 🔥 INIT CHATBOT AFTER DATA */
  if (typeof initBot === "function") {
    initBot();
  }
})();

/* 🔥 TOGGLE */
toggleBtn.addEventListener("click", () => {
  isOpen = !isOpen;

  if (isOpen) {
    root.style.display = "block";
    toggleBtn.innerHTML = "✖";
  } else {
    root.style.display = "none";
    toggleBtn.innerHTML = `<img src="${avatarImg.src}" class="chat-icon-img" />`;
  }
});
</script>

</body>
</html>

    document.addEventListener('DOMContentLoaded', async () => {
      // Configuration
      const protocol = window.location.protocol;
      const host = window.location.host;
      const BASE_URL = `${protocol}//${host}`;
      console.log('Base URL:', BASE_URL);

      // Extract instanceId from URL path
      let instanceId = window.location.pathname.split('/').pop() || window.JnanicInstanceId;
      console.log('Instance ID:', instanceId);

      // State
      let isMinimized = true;
      let isMenuOpen = false;
      let messages = [];
      let history = [];
      let hasFetchedGreeting = false;
      let botDetails = null;
      let botId = null;

      // DOM Elements
      const chatbotContainer = document.getElementById('chatbot-container');
      const botIcon = document.getElementById('bot-icon');
      const botName = document.getElementById('bot-name');
      const messagesContainer = document.getElementById('messages');
      const inputForm = document.getElementById('input-form');
      const chatInput = document.getElementById('chat-input');
      const messageBody = document.getElementById('chatbot-messagebody');
      const trademarkText = document.getElementById('trademark-text');
      const minimizedContent = document.getElementById('minimized-content');
      const minimizedIcon = document.getElementById('minimized-icon');
      const chatMenuBtn = document.getElementById('chatmenu-btn');
      const chatCloseBtn = document.getElementById('chatclose-btn');
      const chatMenu = document.getElementById('chatmenu');
      const downloadBtn = document.getElementById('download-btn');
      const clearChatBtn = document.getElementById('clear-chat-btn');
      const loadHistoryBtn = document.getElementById('load-history-btn');

      // Axios instance without API key or JWT token
      const axiosInstance = axios.create({
        baseURL: BASE_URL,
        headers: {
          'Content-Type': 'application/json'
        }
      });

      // Resolve instance_id to bot_id
      async function resolveInstanceId() {
        try {
          console.log('Resolving instance_id:', instanceId);
          const response = await axiosInstance.get(`/custom-bot/resolve-instance/${instanceId}`);
          console.log('Resolve Instance API Response:', response.data);
          botId = response.data.data.bot_id;
          console.log('Resolved bot_id:', botId);
          return botId;
        } catch (error) {
          console.error('Error resolving instance_id:', {
            message: error.message,
            status: error.response?.status,
            data: error.response?.data
          });
          throw error;
        }
      }

      // Apply colors
      function applyColors(colors) {
        if (colors && typeof colors === 'object') {
          const root = document.documentElement;
          Object.entries(colors).forEach(([key, value]) => {
            if (typeof value === 'string' && value.match(/^#[0-9A-Fa-f]{6}$|^rgb\(\d+,\s*\d+,\s*\d+\)$/)) {
              root.style.setProperty(`--${key}`, value);
            } else if (Array.isArray(value)) {
              const gradient = `linear-gradient(to right, ${value.join(', ')})`;

      // Update DOM with bot details
      function updateBotDetails() {

        messageBody.style.backgroundImage = botDetails.backgroundImage ? `url(${botDetails.backgroundImage})` : '';
        applyColors(botDetails.colors);
      }

      // Fetch bot details
      async function fetchBotDetails() {
        if (!instanceId) {
          console.error('No instanceId provided');
          botDetails = {
            botId: null,
            chatbotName: 'Chatbot',
            disclaimerText: '© 2025 Tata Realty. All rights reserved.',
            greetingType: 'dynamic',
            greetingMessage: null,
            avatar: '/custom-bot/uploads/avatars/chatbot_img.png',
            colors: {
              primary: '#264C68',
              secondary: '#F9F4F8',
              tertiary: '#264C68',
              set1: ['#b54b30', '#cd7b3c', '#4b6eaf'],
              set2: ['#e0b79a', '#e193b9', '#77928b'],
              set3: ['#00c6ff', '#0072ff', '#4b0082']
            },
            backgroundImage: ''
          };
          updateBotDetails();
          return;
        }

        try {
          // Resolve instance_id to bot_id
          await resolveInstanceId();
          if (!botId) {
            throw new Error('Failed to resolve bot_id');
          }

          console.log('Fetching bot details for instanceId:', instanceId);
          const response = await axiosInstance.get(`/custom-bot/get-customize/${instanceId}`);
          console.log('Bot Details API Response:', response.data);
          const data = response.data.data || {};
          botDetails = {
            botId: data.bot_id,
            chatbotName: data.chatbot_name || 'Chatbot',
            disclaimerText: data.disclaimer_text || `© 2025 ${data.chatbot_name || 'Chatbot'}. All rights reserved.`,
            greetingType: data.greeting_type || 'dynamic',
            greetingMessage: data.greeting_type === 'static' ? data.greeting_message : null,
            avatar: data.avatar || '/custom-bot/uploads/avatars/chatbot_img.png',
            colors: data.colors || {
              primary: '#264C68',
              secondary: '#F9F4F8',
              tertiary: '#264C68',
              set1: ['#b54b30', '#cd7b3c', '#4b6eaf'],
              set2: ['#e0b79a', '#e193b9', '#77928b'],
              set3: ['#00c6ff', '#0072ff', '#4b0082']
            },
            backgroundImage: data.background_image || ''
          };
          console.log('Parsed Bot Details:', botDetails);
          updateBotDetails();
          applyColors(botDetails.colors );
        } catch (error) {
          console.error('Error fetching bot details:', {
            message: error.message,
            status: error.response?.status,
            data: error.response?.data
          });
          botDetails = {
            botId: null,
            chatbotName: 'UsbdomainChatbot',
            disclaimerText: '© 2025 Tata Realty. All rights reserved.',
            greetingType: 'dynamic',
            greetingMessage: null,
            avatar: '/custom-bot/uploads/avatars/chatbot_img.png',
            colors: {
              primary: '#264C68',
              secondary: '#F9F4F8',
              tertiary: '#264C68',
              set1: ['#b54b30', '#cd7b3c', '#4b6eaf'],
              set2: ['#e0b79a', '#e193b9', '#77928b'],
              set3: ['#00c6ff', '#0072ff', '#4b0082']
            },
            backgroundImage: ''
          };
          updateBotDetails();
          if (error.response?.status === 404) {
            messages = [{ text: `Bot not found for instance ID: ${instanceId}. Please ensure the subdomain and instance ID are correct.`, sender: 'bot' }];
          } else if (error.response?.status === 400) {
            messages = [{ text: `Invalid request. Subdomain or instance ID may be missing.`, sender: 'bot' }];
          } else {
            messages = [{ text: 'Failed to load bot details. Please try again later.', sender: 'bot' }];
          }
          renderMessages();
        }
      }

      // Initialize chat
      async function initializeChat() {
        if (hasFetchedGreeting) return;
        hasFetchedGreeting = true;

        messages = [{ type: 'loading', sender: 'bot' }];
        renderMessages();

        try {
          await fetchBotDetails();
          if (!botDetails.botId) {
            messages = [{ text: 'Unable to initialize bot. Please check the instance ID and subdomain.', sender: 'bot' }];
            renderMessages();
            return;
          }

          if (botDetails.greetingType === 'static' && botDetails.greetingMessage) {
            messages = [{ text: botDetails.greetingMessage, sender: 'bot' }];
            renderMessages();
            return;
          }

          let historyMessages = [];
          let historyData = [];
          try {
            const historyResponse = await axiosInstance.get(`/custom-bot/chat-history/${instanceId}`);
            console.log('Chat History API Response:', historyResponse.data);
            historyData = historyResponse.data.data?.history || [];
            historyMessages = historyData.map(entry => ({
              text: entry.response,
              sender: entry.query === 'static_greeting' ? 'bot' : entry.query === 'user' ? 'user' : 'bot'
            }));
            history = historyMessages;
          } catch (error) {
            console.error('Error fetching chat history:', {
              message: error.message,
              status: error.response?.status,
              data: error.response?.data
            });
            if (error.response?.status === 404) {
              console.log('No chat history found for instanceId:', instanceId);
              history = [];
              historyData = [];
            } else {
              history = [];
              historyData = [];
            }
          }

          let recentGreeting = historyMessages.find(
            msg =>
              msg.sender === 'bot' &&
              historyData.some(
                entry =>
                  entry.response === msg.text &&
                  entry.query === 'hello' &&
                  new Date(entry.created_at) > new Date(Date.now() - 5 * 60 * 1000)
              )
          );

          if (recentGreeting) {
            messages = [{ text: recentGreeting.text, sender: 'bot' }];
          } else {
            const greetingResponse = await axiosInstance.post(
              '/multi_agents/get_chat',
              {
                query: 'hello',
                bot_id: botDetails.botId,
                history: []
              },
              { timeout: 20000 }

            console.log('Greeting API Response:', greetingResponse.data);
            let botResponse = greetingResponse.data.response || 'No response from bot';
            botResponse = botResponse.replace(/^"(.*)"$/, '$1');
            messages = [{ text: botResponse, sender: 'bot' }];
          }
        } catch (error) {
          console.error('Error initializing greeting:', {
            message: error.message,
            status: error.response?.status,
            data: error.response?.data
          });
          messages = [{ text: 'Welcome! I\'m here to assist you.', sender: 'bot' }];
        }
        renderMessages();
      }

      // Render messages
      function renderMessages() {

        messages.forEach((msg, index) => {
          const messageDiv = document.createElement('div');
          messageDiv.className = `message ${msg.sender === 'user' ? 'user-message' : 'robot-message'}`;
          if (msg.type === 'loading') {
            const spinnerDiv = document.createElement('div');
            spinnerDiv.className = 'message-spinner';
            const spinner = document.createElement('div');
            spinner.className = 'spinner';
            spinnerDiv.appendChild(spinner);
            messageDiv.appendChild(spinnerDiv);
          } else {
            messageDiv.textContent = msg.text;
          }
          messagesContainer.appendChild(messageDiv);
        });
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }

      // Send message
      async function sendMessage(e) {
        e.preventDefault();
        if (!chatInput.value.trim()) return;

        const userMessage = { text: chatInput.value, sender: 'user' };
        messages.push(userMessage, { type: 'loading', sender: 'bot' });
        renderMessages();
        chatInput.value = '';

        try {
          const response = await axiosInstance.post(
            '/multi_agents/get_chat',
            {
              query: userMessage.text,
              bot_id: botDetails.botId,
              history: messages
                .filter(msg => msg.type !== 'loading')
                .map(msg => ({
                  query: msg.sender === 'user' ? msg.text : '',
                  response: msg.sender === 'bot' ? msg.text : ''
                }))
            },
            { timeout: 20000 }
          );
          console.log('Message API Response:', response.data);
          let botResponse = response.data.response || 'No response from bot';
          botResponse = botResponse.replace(/^"(.*)"$/, '$1');
          messages = [...messages.slice(0, -1), { text: botResponse, sender: 'bot' }];
        } catch (error) {
          console.error('Error sending message:', {
            message: error.message,
            status: error.response?.status,
            data: error.response?.data
          });
          let errorMessage = 'Error reaching AI service';
          if (error.response?.status === 403) {
            errorMessage = 'The bot is not available to respond.';
          } else if (error.response?.status === 404) {
            errorMessage = 'Bot not found. Please check the instance ID and subdomain.';
          } else if (error.response?.status === 400) {
            errorMessage = 'Invalid request. Subdomain or instance ID may be missing.';
          }
          messages = [...messages.slice(0, -1), { text: errorMessage, sender: 'bot' }];
        }
        renderMessages();
      }

      // Toggle minimize
      function toggleMinimize() {

        }
      }

      // Toggle menu
      function toggleMenu() {
        isMenuOpen = !isMenuOpen;
        chatMenu.classList.toggle('active', isMenuOpen);
      }

      // Clear chat
      function clearChat() {
        const greetingMessage =
          botDetails?.greetingType === 'static' && botDetails?.greetingMessage
            ? botDetails.greetingMessage
            : 'Welcome! I\'m here to assist you.';
        messages = [{ text: greetingMessage, sender: 'bot' }];
        renderMessages();
        toggleMenu();
      }

      // Download chat
      function downloadChat() {
        const chatContent = messages
          .filter(msg => msg.type !== 'loading')
          .map(msg => `${msg.sender}: ${msg.text}`)
          .join('\n');
        const blob = new Blob([chatContent], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'chat_history.txt';
        a.click();
        URL.revokeObjectURL(url);
        toggleMenu();
      }

      async function loadHistory() {
        try {

          console.log('Load History API Response:', historyResponse.data);
          const historyData = historyResponse.data.data?.history || [];

            sender: entry.query === 'static_greeting' ? 'bot' : entry.query === 'user' ? 'user' : 'bot'
          }));
          history = historyMessages;
          messages = [
            ...historyMessages,
            ...messages.filter(
              msg => msg.sender === 'user' || !historyMessages.some(h => h.text === msg.text)
            )
          ];
        } catch (error) {
          console.error('Error loading chat history:', {

          });

          } else {
            messages = [...messages, { text: 'Failed to load chat history.', sender: 'bot' }];
          }
        }
        renderMessages();

      chatCloseBtn.addEventListener('click', toggleMinimize);

      minimizedContent.addEventListener('click', toggleMinimize);
      clearChatBtn.addEventListener('click', clearChat);
      downloadBtn.addEventListener('click', downloadChat);

      // Initialize

      }
      .chatbot-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 300px;
        height: 463px;
        margin-top:70px;
        background-color: #fff;

      }

      /* Hide all elements inside chatbot-container when minimized, except minimized-content */
      .chatbot-container.minimized .wave-container,
      .chatbot-container.minimized .chatbot-body {
        display: none;
      }

      /* Ensure minimized-content is visible and styled correctly */
      .minimized-content {
        display: none; /* Hidden by default */
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        cursor: pointer;
      }

      .chatbot-container.minimized .minimized-content {
        display: flex; /* Show only when minimized */
      }

      .chatbot-icon {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover; /* Ensure the image fits properly */
      }

      .chatmenu {
        position: absolute;
        top: 35px;
        right: -8px;
        z-index: 1001;
        display: none; /* Hidden by default */
      }

      .chatmenu.active {
        display: flex; /* Show when active */
      }

      .chatmenu ul {
        list-style: none;
        padding: 5px;
        margin: 0;
        color: #ffffff !important;
      }

      .chatmenu li {
        padding: 5px 10px;
      }

      .chatmenu li button {
        background: none;
        border: none;
        font-size: 16px;
        cursor: pointer;
        color: #333;
        width: 100%;
        text-align: left;
      }

      .chatmenu li button:hover {
        color: #007bff;
      }

      .header-buttons {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 8px;
        position: relative;
      }

      #chatmenu-btn,
      #chatclose-btn {
        background: transparent;
        border: none;
        font-size: 18px;
        color: #ffffff;
        cursor: pointer;
        padding: 5px;
      }

      #chatmenu-btn:hover,
      #chatclose-btn:hover {
        color: #d0d0d0;
      }
      .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        animation: spin 1s linear infinite;
        color: var(--secondary-color);
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>

                    ⟳

        </div>
        <svg viewBox="0 0 1440 320" preserveAspectRatio="xMidYMid meet">

          ></path>

      <div class="chatbot-body">

          >

      <div id="minimized-content" class="minimized-content">

          id="minimized-icon"
          src="/custom-bot/uploads/avatars/chatbot_img.png"
          alt="Chatbot Icon"
          class="chatbot-icon"
        />
      </div>
    </div>
<script>
      document.addEventListener("DOMContentLoaded", async () => {
        // Configuration
        sessionStorage.removeItem("tempToken");
        const protocol = window.location.protocol;
        const host = window.location.host;
        const BASE_URL = `${protocol}//${host}`;
        console.log("Base URL:", BASE_URL);
        const DEPENDENCY_TIMEOUT = 20000;
        const TOKEN_REFRESH_INTERVAL = 12 * 60 * 1000;
        const DEFAULT_GREETING =
          "Hello! I'm your friendly assistant. How can I help you today?";
        const DEFAULT_AVATAR = "/custom-bot/uploads/avatars/chatbot_img.png";

        // Extract instanceId from URL path or script tag
        let instanceId =
          window.location.pathname.split("/").pop() || window.JnanicInstanceId;
        console.log("Instance ID:", instanceId);
        
        // State
        let isMinimized = true;
        let isMenuOpen = false;
        let messages = [];
        let history = [];
        let hasFetchedGreeting = false;
        let hasFetchedBotDetails = false;
        let botDetails = null;
        let botId = null;
        let isVerified = false;

        let isSending = false;
        let sendRetryCount = 5;
        const MAX_RETRIES = 10;
        
        // Get API key from Flask template context variable
        const apiKey = "{{ api_key }}";
        console.log("API Key loaded from template:", apiKey ? "✓" : "✗");

        // DOM Elements
        const chatbotContainer = document.getElementById("chatbot-container");
        const botIcon = document.getElementById("bot-icon");
        const botName = document.getElementById("bot-name");
        const messagesContainer = document.getElementById("messages");
        const inputForm = document.getElementById("input-form");
        const chatInput = document.getElementById("chat-input");
        const messageBody = document.getElementById("chatbot-messagebody");
        const trademarkText = document.getElementById("trademark-text");
        const minimizedContent = document.getElementById("minimized-content");
        const minimizedIcon = document.getElementById("minimized-icon");
        const chatMenuBtn = document.getElementById("chatmenu-btn");
        const chatCloseBtn = document.getElementById("chatclose-btn");
        const chatMenu = document.getElementById("chatmenu");
        const downloadBtn = document.getElementById("download-btn");
        const clearChatBtn = document.getElementById("clear-chat-btn");
        const loadHistoryBtn = document.getElementById("load-history-btn");

        // Axios instance with API key from Flask template
        const axiosInstance = axios.create({
          baseURL: BASE_URL,
          headers: {
            "Content-Type": "application/json",
            "X-API-Key": apiKey  // Add API key to headers
          },
          timeout: DEPENDENCY_TIMEOUT,
        });

        // Check for existing token
        const tempToken = sessionStorage.getItem("tempToken");
        if (tempToken) {
          axiosInstance.defaults.headers.common[
            "Authorization"
          ] = `Bearer ${tempToken}`;
          isVerified = true;
        }

      function toggleMinimize() {
        isMinimized = !isMinimized;
        chatbotContainer.classList.toggle('minimized', isMinimized);
        if (isMenuOpen) {
          isMenuOpen = false;
          chatMenu.classList.remove('active');
        }
      }       
 // Client info and token retrieval
        async function getClientInfo() {
          const ipServices = [
            { url: "https://api.ipify.org?format=json", type: "json" },
            { url: "https://ipinfo.io/json", type: "json" },
            { url: "https://ipv4.icanhazip.com", type: "text" },
            { url: "https://api.myip.com", type: "json" },
          ];

          let ip = null;
          try {
            const results = await Promise.any(
              ipServices.map(async (service) => {
                const controller = new AbortController();
                const timeoutId = setTimeout(
                  () => controller.abort(),
                  DEPENDENCY_TIMEOUT
                );
                const res = await fetch(service.url, {
                  cache: "no-store",
                  signal: controller.signal,
                });
                clearTimeout(timeoutId);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                if (service.type === "text") return (await res.text()).trim();
                const data = await res.json();
                return data.ip || data.query;
              })
            );
            ip = results;
            console.log("Client IP:", ip);
          } catch (err) {
            console.error("All IP services failed:", err);
            messages = [
              ...messages.slice(0, -1),
              {
                text: "Error: Unable to fetch client IP. Please try again later.",
                sender: "bot",
              },
            ];
            renderMessages();
            return false;
          }

          let domain = null;
          if (ip && ip.includes(".")) {
            const reversedIp = ip.split(".").reverse().join(".");
            try {
              const controller = new AbortController();
              const timeoutId = setTimeout(
                () => controller.abort(),
                DEPENDENCY_TIMEOUT
              );
              const dnsRes = await fetch(
                `https://dns.google/resolve?name=${reversedIp}.in-addr.arpa&type=PTR`,
                { signal: controller.signal }
              );
              clearTimeout(timeoutId);
              const dnsData = await dnsRes.json();
              if (dnsData.Answer?.length > 0) {
                domain = dnsData.Answer[0].data.replace(/\.$/, "");
              }
            } catch (err) {
              console.warn("Reverse DNS lookup failed", err);
            }
          }

          try {
            if (!botId) {
              await resolveInstanceId();
            }
            console.log("Validating client with:", {
              bot_id: botId,
              ip,
              domain: domain || window.location.hostname,
            });
            const validationRes = await axiosInstance.post(
              "/custom-bot/validate_client",
              {
                bot_id: botId,
                ip: ip,
                domain: window.location.hostname,
              },
              {
                headers: { 'X-API-Key': apiKey }  // Ensure API key is sent
              }
            );
            console.log("Client Validation Response:", validationRes.data);

            if (validationRes.data.status === "ok") {
              isVerified = true;
              const tempToken = validationRes.data.token;
              sessionStorage.setItem("tempToken", tempToken);
              axiosInstance.defaults.headers.common[
                "Authorization"
              ] = `Bearer ${tempToken}`;
              console.log("Client validated, token set:", tempToken);
              return true;
            }
          } catch (err) {
            isVerified = false;
            console.error("Error sending client info to backend:", {
              message: err.message,
              status: err.response?.status,
              data: err.response?.data,
            });
            let errorMessage =
              "Error: Chatbot service not available. Please try again later.";
            if (err.response?.status === 404) {
              errorMessage =
                "Error: Chatbot service not found. Please contact support.";
            } else if (err.response?.status === 403) {
              errorMessage =
                "Error: Access denied. Your IP or domain is not allowed.";
            } else if (err.response?.status === 401) {
              errorMessage =
                "Error: Authentication failed. Please check your API key.";
            }
            messages = [
              ...messages.slice(0, -1),
              { text: errorMessage, sender: "bot" },
            ];
            renderMessages();
            return false;
          }
          return false;
        }

        // Resolve instance_id to bot_id
        async function resolveInstanceId() {
          console.log("apiKey:", apiKey);
          try {
            console.log("Resolving instance_id:", instanceId);
            const response = await axiosInstance.get(
              `/custom-bot/resolve-instance/${instanceId}`,
              {
                headers: { 'X-API-Key': apiKey }  // Ensure API key is sent
              }
            );
            console.log("Resolve Instance API Response:", response.data);
            botId = response.data.data.bot_id;
            console.log("Resolved bot_id:", botId);
            return botId;
          } catch (error) {
            console.error("Error resolving instance_id:", {
              message: error.message,
              status: error.response?.status,
              data: error.response?.data,
            });
            let errorMessage = "Error: Failed to resolve instance ID.";
            if (error.response?.status === 404) {
              errorMessage = `Bot not found for instance ID: ${instanceId}.`;
            } else if (error.response?.status === 400) {
              errorMessage =
                "Invalid request. Instance ID or API key may be missing.";
            } else if (error.response?.status === 401) {
              errorMessage = "Unauthorized. Please check your API key.";
            }
            messages = [{ text: errorMessage, sender: "bot" }];
            renderMessages();
            throw error;
          }
        }

        // Apply colors
        function applyColors(colors) {
          if (colors && typeof colors === "object") {
            const root = document.documentElement;
            Object.entries(colors).forEach(([key, value]) => {
              if (
                typeof value === "string" &&
                value.match(/^#[0-9A-Fa-f]{6}$|^rgb\(\d+,\s*\d+,\s*\d+\)$/)
              ) {
                root.style.setProperty(`--${key}`, value);
              } else if (Array.isArray(value)) {
                const gradient = `linear-gradient(to right, ${value.join(
                  ", "
                )})`;
                root.style.setProperty(`--${key}-gradient`, gradient);
              }
            });
          }
        }

        // Update DOM with bot details
        function updateBotDetails() {
          botName.textContent = botDetails.chatbotName;
          botIcon.src = botDetails.avatar;
          minimizedIcon.src = botDetails.avatar;
          trademarkText.textContent = botDetails.disclaimerText;
          messageBody.style.backgroundImage = botDetails.backgroundImage
            ? `url(${botDetails.backgroundImage})`
            : "";
          applyColors(botDetails.colors);
        }

        // Fetch bot details
        async function fetchBotDetails() {
          if (!instanceId) {
            console.error("No instanceId provided");
            botDetails = {
              botId: null,
              chatbotName: "Chatbot",
              disclaimerText: "© 2025 Tata Realty. All rights reserved.",
              greetingType: "static",
              greetingMessage: DEFAULT_GREETING,
              avatar: DEFAULT_AVATAR,
              colors: {
                primary: "#264C68",
                secondary: "#F9F4F8",
                tertiary: "#264C68",
                set1: ["#b54b30", "#cd7b3c", "#4b6eaf"],
                set2: ["#e0b79a", "#e193b9", "#77928b"],
                set3: ["#00c6ff", "#0072ff", "#4b0082"],
              },
              backgroundImage: "",
            };
            updateBotDetails();
            return;
          }

          try {
            // Resolve instance_id to bot_id
            await resolveInstanceId();
            if (!botId) {
              throw new Error("Failed to resolve bot_id");
            }

            console.log("Fetching bot details for instanceId:", instanceId);
            const response = await axiosInstance.get(
              `/custom-bot/get-customize/${instanceId}`,
              {
                headers: { 'X-API-Key': apiKey }  // Ensure API key is sent
              }
            );
            console.log("Bot Details API Response:", response.data);
            const data = response.data.data || {};
            botDetails = {
              botId: data.bot_id || botId,
              chatbotName: data.chatbot_name || "Chatbot",
              disclaimerText:
                data.disclaimer_text ||
                `© 2025 ${
                  data.chatbot_name || "Chatbot"
                }. All rights reserved.`,
              greetingType: data.greeting_type || "dynamic",
              greetingMessage:
                data.greeting_type === "static" ? data.greeting_message : null,
              avatar: data.avatar || DEFAULT_AVATAR,
              colors: data.colors || {
                primary: "#264C68",
                secondary: "#F9F4F8",
                tertiary: "#264C68",
                set1: ["#b54b30", "#cd7b3c", "#4b6eaf"],
                set2: ["#e0b79a", "#e193b9", "#77928b"],
                set3: ["#00c6ff", "#0072ff", "#4b0082"],
              },
              backgroundImage: data.background_image || "",
            };
            console.log("Parsed Bot Details:", botDetails);
            updateBotDetails();
          } catch (error) {
            console.error("Error fetching bot details:", {
              message: error.message,
              status: error.response?.status,
              data: error.response?.data,
            });
            botDetails = {
              botId: botId || null,
              chatbotName: "Chatbot",
              disclaimerText: "© 2025 Tata Realty. All rights reserved.",
              greetingType: "static",
              greetingMessage: DEFAULT_GREETING,
              avatar: DEFAULT_AVATAR,
              colors: {
                primary: "#264C68",
                secondary: "#F9F4F8",
                tertiary: "#264C68",
                set1: ["#b54b30", "#cd7b3c", "#4b6eaf"],
                set2: ["#e0b79a", "#e193b9", "#77928b"],
                set3: ["#00c6ff", "#0072ff", "#4b0082"],
              },
              backgroundImage: "",
            };
            updateBotDetails();
            messages = [
              { text: botDetails.greetingMessage, sender: "bot" },
              {
                text: `Warning: Failed to load bot details. Using default settings. ${
                  error.response?.status === 404
                    ? `Bot not found for instance ID: ${instanceId}.`
                    : "Please try again later."
                }`,
                sender: "bot",
              },
            ];
            renderMessages();
          }
        }

        // Initialize chat
        async function initializeChat() {
          if (hasFetchedGreeting) return;
          hasFetchedGreeting = true;

          messages = [{ type: 'loading', sender: 'bot' }];
          renderMessages();

          try {
            await fetchBotDetails();
            if (!botDetails.botId) {
              messages = [{ text: 'Unable to initialize bot. Please check the instance ID and API key.', sender: 'bot' }];
              renderMessages();
              return;
            }

            if (botDetails.greetingType === 'static' && botDetails.greetingMessage) {
              messages = [{ text: botDetails.greetingMessage, sender: 'bot' }];
              renderMessages();
              return;
            }

            let historyMessages = [];
            let historyData = [];
            try {
              const token = sessionStorage.getItem("tempToken");
              const headers = token ? { Authorization: `Bearer ${token}`, 'X-API-Key': apiKey } : { 'X-API-Key': apiKey };
              const historyResponse = await axiosInstance.get(`/custom-bot/chat-history/${instanceId}`, { headers });
              console.log('Chat History API Response:', historyResponse.data);
              historyData = historyResponse.data.data?.history || [];
              historyMessages = historyData.map(entry => ({
                text: entry.response,
                sender: entry.query === 'static_greeting' ? 'bot' : entry.query === 'user' ? 'user' : 'bot'
              }));
              history = historyMessages;
            } catch (error) {
              console.error('Error fetching chat history:', {
                message: error.message,
                status: error.response?.status,
                data: error.response?.data
              });
              if (error.response?.status === 404) {
                console.log('No chat history found for instanceId:', instanceId);
                history = [];
                historyData = [];
              } else {
                history = [];
                historyData = [];
              }
            }

            let recentGreeting = historyMessages.find(
              msg =>
                msg.sender === 'bot' &&
                historyData.some(
                  entry =>
                    entry.response === msg.text &&
                    entry.query === 'hello' &&
                    new Date(entry.created_at) > new Date(Date.now() - 5 * 60 * 1000)
                )
            );

            if (recentGreeting) {
              messages = [{ text: recentGreeting.text, sender: 'bot' }];
            } else {
              messages = [{ text: DEFAULT_GREETING, sender: 'bot' }];
            }
          } catch (error) {
            console.error('Error initializing greeting:', {
              message: error.message,
              status: error.response?.status,
              data: error.response?.data
            });
            messages = [{ text: DEFAULT_GREETING, sender: 'bot' }];
          }
          renderMessages();
        }

        // Render messages
        function renderMessages() {
          messagesContainer.innerHTML = "";
          messages.forEach((msg, index) => {
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${
              msg.sender === "user" ? "user-message" : "robot-message"
            }`;
            if (msg.type === "loading") {
              const spinnerDiv = document.createElement("div");
              spinnerDiv.className = "message-spinner";
              const spinner = document.createElement("div");
              spinner.className = "spinner";
              spinnerDiv.appendChild(spinner);
              messageDiv.appendChild(spinnerDiv);
            } else {
              messageDiv.textContent = msg.text;
            }
            messagesContainer.appendChild(messageDiv);
          });
          messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
       
                // --- Session Helpers (define once outside sendMessage) ---
        function generateUUID() {
          if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
          return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, (c) => {
            const r = (Math.random() * 16) | 0;
            const v = c === "x" ? r : (r & 0x3) | 0x8;
            return v.toString(16);
          });
        }

        function getOrCreateSessionId(botId) {
          const key = `bot_session_${botId}`;
          let sid = localStorage.getItem(key);
          if (!sid) {
            sid = generateUUID();
            localStorage.setItem(key, sid);
          }
          return sid;
        }

        // --- Send Message ---
        async function sendMessage(e) {
          e.preventDefault();
          if (!chatInput.value.trim() || isSending) return;

          isSending = true;

          if (sendRetryCount >= MAX_RETRIES) {
            // replace loading message with final error
            messages = [
              ...messages.slice(0, -1),
              { text: "Failed to send message after multiple attempts.", sender: "bot" }
            ];
            renderMessages();
            isSending = false;
            sendRetryCount = 0;
            return;
          }

          const userMessage = { text: chatInput.value, sender: "user" };
          messages.push(userMessage, { type: "loading", sender: "bot" });
          renderMessages();
          chatInput.value = "";

          try {
            // verify client once
            if (!isVerified) {
              const verified = await getClientInfo();
              if (!verified) {
                isSending = false;
                return; // spinner already removed in getClientInfo
              }
            }

            const token = sessionStorage.getItem("tempToken");
            if (!token) {
              messages = [
                ...messages.slice(0, -1),
                { text: "Error: Authentication token missing. Please try again.", sender: "bot" }
              ];
              renderMessages();
              isSending = false;
              return;
            }

            // ✅ always use persisted session
            const sid = getOrCreateSessionId(botDetails.botId);

            const response = await axiosInstance.post("/multi_agents/get_chat", {
              query: userMessage.text,
              bot_id: botDetails.botId,
              history: messages
                .filter((msg) => msg.type !== "loading")
                .map((msg) => ({
                  query: msg.sender === "user" ? msg.text : "",
                  response: msg.sender === "bot" ? msg.text : "",
                })),
              session_id: sid,
            });

            console.log("Message API Response:", response.data);

            let botResponse = response.data.response || "No response from bot";
            botResponse = botResponse.replace(/^"(.*)"$/, "$1"); // strip quotes if present

            // replace loading with bot response
            messages = [...messages.slice(0, -1), { text: botResponse, sender: "bot" }];
            sendRetryCount = 0;
          } catch (error) {
            console.error("Error sending message:", {
              message: error.message,
              status: error.response?.status,
              data: error.response?.data,
            });

            let errorMessage = "Error: Failed to process your message. Please try again.";
            if (error.response?.status === 400) {
              errorMessage = "Invalid request. Instance ID or API key may be missing.";
            } else if (error.response?.status === 401) {
              errorMessage = "Error: Authentication failed. Please try again.";
            } else if (error.response?.status === 403) {
              errorMessage = "Error: Access denied. Please check your permissions.";
            } else if (error.response?.status === 404) {
              errorMessage = "Error: Chat service not found. Please contact support.";
            }

            // replace loading with error
            messages = [...messages.slice(0, -1), { text: errorMessage, sender: "bot" }];
            sendRetryCount++;
          }

          renderMessages();
          isSending = false;
