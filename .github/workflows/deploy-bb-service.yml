name: Deploy bb_service to VM path

on:
  push:
    branches: ["main"]

concurrency:
  group: bb-service
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Deploy (sync to /root/botBuilder/bb_master/bb_service)
        run: |
          sudo -n /usr/local/bin/deploy_bb_service.sh "$PWD"
